services:
  - type: web
    name: gtm-performance-tool
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python gtm_server.py
    disk:
      name: gtm-performance-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: GTM_DATA_DIR
        value: /var/data/gtm_data

  - type: web
    name: sme-incentive-portal
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
