services:
  - type: web
    name: gtm-performance-tool
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python gtm_server.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"

  - type: web
    name: sme-incentive-portal
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
